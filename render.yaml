services:
  - type: web
    name: collabydraw-api
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: pnpm --filter api start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: web
    name: collabydraw-websocket
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter websocket build
    startCommand: pnpm --filter websocket start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
